name: lottery-platform-prod

services:
  nginx:
    image: nginx:1.29-alpine
    container_name: lottery-prod-nginx
    restart: unless-stopped
    ports:
      - "${PUBLIC_HTTP_PORT:-80}:80"
      - "${PUBLIC_HTTPS_PORT:-443}:443"
    volumes:
      - ../conf/nginx/conf.d:/etc/nginx/conf.d:ro
      - ../conf/nginx/html:/usr/share/nginx/html:ro
      - ../data/nginx/logs:/var/log/nginx
    depends_on:
      - gateway
    networks:
      - lottery-prod-net

  gateway:
    image: ${GATEWAY_IMAGE:-lottery-platform/gateway:latest}
    build:
      context: ../../..
      dockerfile: deploy/prod/docker/java-service.Dockerfile
      args:
        JAR_FILE: artifacts/backend/lottery-gateway.jar
    container_name: lottery-prod-gateway
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SPRING_CLOUD_NACOS_DISCOVERY_ENABLED: ${NACOS_DISCOVERY_ENABLED:-false}
      SPRING_CLOUD_GATEWAY_DISCOVERY_LOCATOR_ENABLED: ${GATEWAY_DISCOVERY_ENABLED:-false}
      LOTTERY_DB_URL: ${LOTTERY_DB_URL}
      LOTTERY_DB_USERNAME: ${LOTTERY_DB_USERNAME}
      LOTTERY_DB_PASSWORD: ${LOTTERY_DB_PASSWORD}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      NACOS_SERVER_ADDR: ${NACOS_SERVER_ADDR:-}
    depends_on:
      - redis
      - postgres
      - user
      - award
      - lottery
      - ai
    networks:
      - lottery-prod-net

  user:
    image: ${USER_IMAGE:-lottery-platform/user:latest}
    build:
      context: ../../..
      dockerfile: deploy/prod/docker/java-service.Dockerfile
      args:
        JAR_FILE: artifacts/backend/lottery-user.jar
    container_name: lottery-prod-user
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SPRING_CLOUD_NACOS_DISCOVERY_ENABLED: ${NACOS_DISCOVERY_ENABLED:-false}
      LOTTERY_DB_URL: ${LOTTERY_DB_URL}
      LOTTERY_DB_USERNAME: ${LOTTERY_DB_USERNAME}
      LOTTERY_DB_PASSWORD: ${LOTTERY_DB_PASSWORD}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      NACOS_NAMESPACE: ${NACOS_NAMESPACE:-public}
      NACOS_SERVER_ADDR: ${NACOS_SERVER_ADDR:-}
    depends_on:
      - redis
      - postgres
    networks:
      - lottery-prod-net

  award:
    image: ${AWARD_IMAGE:-lottery-platform/award:latest}
    build:
      context: ../../..
      dockerfile: deploy/prod/docker/java-service.Dockerfile
      args:
        JAR_FILE: artifacts/backend/lottery-award.jar
    container_name: lottery-prod-award
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SPRING_CLOUD_NACOS_DISCOVERY_ENABLED: ${NACOS_DISCOVERY_ENABLED:-false}
      LOTTERY_DB_URL: ${LOTTERY_DB_URL}
      LOTTERY_DB_USERNAME: ${LOTTERY_DB_USERNAME}
      LOTTERY_DB_PASSWORD: ${LOTTERY_DB_PASSWORD}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      NACOS_NAMESPACE: ${NACOS_NAMESPACE:-public}
      NACOS_SERVER_ADDR: ${NACOS_SERVER_ADDR:-}
    depends_on:
      - redis
      - postgres
    networks:
      - lottery-prod-net

  lottery:
    image: ${LOTTERY_IMAGE:-lottery-platform/lottery:latest}
    build:
      context: ../../..
      dockerfile: deploy/prod/docker/java-service.Dockerfile
      args:
        JAR_FILE: artifacts/backend/lottery-lottery.jar
    container_name: lottery-prod-lottery
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SPRING_CLOUD_NACOS_DISCOVERY_ENABLED: ${NACOS_DISCOVERY_ENABLED:-false}
      LOTTERY_DB_URL: ${LOTTERY_DB_URL}
      LOTTERY_DB_USERNAME: ${LOTTERY_DB_USERNAME}
      LOTTERY_DB_PASSWORD: ${LOTTERY_DB_PASSWORD}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      NACOS_NAMESPACE: ${NACOS_NAMESPACE:-public}
      NACOS_SERVER_ADDR: ${NACOS_SERVER_ADDR:-}
    depends_on:
      - redis
      - postgres
    networks:
      - lottery-prod-net

  ai:
    image: ${AI_IMAGE:-lottery-platform/ai:latest}
    build:
      context: ../../..
      dockerfile: deploy/prod/docker/java-service.Dockerfile
      args:
        JAR_FILE: artifacts/backend/lottery-ai.jar
    container_name: lottery-prod-ai
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SPRING_CLOUD_NACOS_DISCOVERY_ENABLED: ${NACOS_DISCOVERY_ENABLED:-false}
      LOTTERY_DB_URL: ${LOTTERY_DB_URL}
      LOTTERY_DB_USERNAME: ${LOTTERY_DB_USERNAME}
      LOTTERY_DB_PASSWORD: ${LOTTERY_DB_PASSWORD}
      NACOS_NAMESPACE: ${NACOS_NAMESPACE:-public}
      NACOS_SERVER_ADDR: ${NACOS_SERVER_ADDR:-}
      GLM_ENABLED: ${GLM_ENABLED:-true}
      GLM_API_KEY: ${GLM_API_KEY:-}
      GLM_MODEL: ${GLM_MODEL:-glm-5.1}
    depends_on:
      - postgres
    networks:
      - lottery-prod-net

  postgres:
    image: postgres:${POSTGRES_IMAGE_TAG:-17-alpine}
    container_name: lottery-prod-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lottery-platform}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
      TZ: ${CONTAINER_TZ:-Asia/Shanghai}
      PGTZ: ${CONTAINER_TZ:-Asia/Shanghai}
    volumes:
      - ../data/postgres:/var/lib/postgresql/data
    networks:
      - lottery-prod-net

  redis:
    image: redis:${REDIS_IMAGE_TAG:-7-alpine}
    container_name: lottery-prod-redis
    restart: unless-stopped
    command: [ "redis-server", "--appendonly", "yes" ]
    volumes:
      - ../data/redis:/data
    networks:
      - lottery-prod-net

networks:
  lottery-prod-net:
    driver: bridge
