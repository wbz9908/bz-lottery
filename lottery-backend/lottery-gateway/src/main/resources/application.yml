server:
  port: 9008

spring:
  application:
    name: lottery-gateway
  threads:
    virtual:
      enabled: true
  main:
    web-application-type: reactive
  cloud:
    nacos:
      discovery:
        enabled: true
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:public}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
      config:
        enabled: false
    sentinel:
      eager: false
    gateway:
      server:
        webflux:
          routes:
            - id: lottery-user-static
              uri: http://user:9101
              predicates:
                - Path=/lottery-user/**
              filters:
                - StripPrefix=1
            - id: lottery-award-static
              uri: http://award:9104
              predicates:
                - Path=/lottery-award/**
              filters:
                - StripPrefix=1
            - id: lottery-lottery-static
              uri: http://lottery:9103
              predicates:
                - Path=/lottery-lottery/**
              filters:
                - StripPrefix=1
            - id: lottery-ai-static
              uri: http://ai:9108
              predicates:
                - Path=/lottery-ai/**
              filters:
                - StripPrefix=1
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level traceId=%X{traceId:-N/A} %logger{36} - %msg%n"

app:
  gateway:
    auth:
      token-name: satoken
      public-paths:
        - /swagger-ui.html
        - /swagger-ui
        - /swagger-ui/
        - /swagger-ui/**
        - /v3/api-docs
        - /v3/api-docs/**
        - /actuator
        - /actuator/**
        - /lottery-user/api/user/ping
        - /lottery-user/api/user/auth/login
        - /lottery-user/api/user/auth/register
        - /lottery-user/api/user/auth/keycloak/exchange
        - /lottery-ai/api/ai/ping
      protected-paths:
        - /lottery-award/api/award/**
        - /lottery-lottery/api/lottery/**
        - /lottery-ai/api/ai/**
