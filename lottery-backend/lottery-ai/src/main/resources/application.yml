server:
  port: 9108

spring:
  application:
    name: lottery-ai
  datasource:
    url: ${LOTTERY_DB_URL:jdbc:postgresql://localhost:5432/lottery-platform}
    username: ${LOTTERY_DB_USERNAME:postgres}
    password: ${LOTTERY_DB_PASSWORD:123456}
    driver-class-name: org.postgresql.Driver
  threads:
    virtual:
      enabled: true
  cloud:
    nacos:
      discovery:
        enabled: true
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:public}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
      config:
        enabled: false
    sentinel:
      eager: false
  flyway:
    enabled: false

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level traceId=%X{traceId:-N/A} %logger{36} - %msg%n"

ai:
  glm:
    enabled: ${GLM_ENABLED:true}
    api-key: ${GLM_API_KEY:fadcf7b4ea4ac3b5cb6903e577a73195.AMhZbhAvIMJ6ZF6t}
    model: ${GLM_MODEL:glm-5.1}
    temperature: ${GLM_TEMPERATURE:0.6}
    max-tokens: ${GLM_MAX_TOKENS:1024}
    # 可切换为 classpath:prompt/OTHER_PROMPT.md 或 file:D:/config/lottery-ai/prompt.md
    system-prompt-location: ${AI_SYSTEM_PROMPT_LOCATION:classpath:prompt/SYSTEM_PROMPT.md}
    connect-timeout: ${GLM_CONNECT_TIMEOUT:PT5S}
    read-timeout: ${GLM_READ_TIMEOUT:PT60S}
