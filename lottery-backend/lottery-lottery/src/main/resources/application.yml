server:
  port: 9103

spring:
  application:
    name: lottery-lottery
  datasource:
    url: ${LOTTERY_DB_URL:jdbc:postgresql://localhost:5432/lottery-platform}
    username: ${LOTTERY_DB_USERNAME:postgres}
    password: ${LOTTERY_DB_PASSWORD:123456}
    driver-class-name: org.postgresql.Driver
  threads:
    virtual:
      enabled: true
  cloud:
    nacos:
      discovery:
        enabled: true
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:public}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
      config:
        enabled: false
    sentinel:
      eager: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
  flyway:
    enabled: true
    locations: classpath:db/migration
    default-schema: lottery_platform
    schemas: lottery_platform
    create-schemas: true
    baseline-on-migrate: true
    baseline-version: 1

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

dubbo:
  application:
    name: lottery-lottery
    qos-enable: false
  protocol:
    name: dubbo
    port: -1
  registry:
    address: N/A

rocketmq:
  name-server: ${ROCKETMQ_NAME_SERVER:localhost:9876}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level traceId=%X{traceId:-N/A} %logger{36} - %msg%n"
